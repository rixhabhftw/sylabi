<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Syllabus Tracker</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --border: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Navigation mimicking the top bar */
        nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Main Content Area */
        main {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 500px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: var(--card-bg);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 3rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Subject Sections */
        .subject-group {
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
        }

        .subject-header {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .subject-header:hover {
            background-color: #1a1a1a;
        }

        .subject-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .toggle-icon {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .topic-list {
            display: none; /* Hidden by default */
            padding: 0 1.5rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        .topic-list.active {
            display: block;
        }

        /* Checkbox Styling */
        .topic-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #222;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .topic-item:hover {
            color: var(--text-main);
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            background-color: transparent;
        }

        input[type="checkbox"]:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: black;
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JEE TRACKER</div>
        <div class="status">Pre-Alpha</div>
    </nav>

    <main>
        <h1>Master Your Syllabus.</h1>
        <p class="subtitle">Track your progress through Physics, Chemistry, and Mathematics with a distraction-free interface.</p>

        <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">
            <span>Overall Progress</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="overall-progress"></div>
        </div>

        <div class="subject-group">
            <div class="subject-header" onclick="toggleSection('physics')">
                <span class="subject-title">Physics</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="topic-list" id="physics">
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Kinematics</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Laws of Motion</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Work, Energy and Power</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Rotational Motion</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Gravitation</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Thermodynamics</label>
            </div>
        </div>

        <div class="subject-group">
            <div class="subject-header" onclick="toggleSection('chemistry')">
                <span class="subject-title">Chemistry</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="topic-list" id="chemistry">
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Atomic Structure</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Chemical Bonding</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Thermodynamics</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Equilibrium</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Redox Reactions</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Organic Chemistry Basics</label>
            </div>
        </div>

        <div class="subject-group">
            <div class="subject-header" onclick="toggleSection('maths')">
                <span class="subject-title">Mathematics</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="topic-list" id="maths">
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Sets, Relations and Functions</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Complex Numbers</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Quadratic Equations</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Permutations and Combinations</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Binomial Theorem</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Sequence and Series</label>
                <label class="topic-item"><input type="checkbox" onchange="updateProgress()"> Calculus</label>
            </div>
        </div>

    </main>

    <script>
        function toggleSection(id) {
            const section = document.getElementById(id);
            if (section.classList.contains('active')) {
                section.classList.remove('active');
            } else {
                section.classList.add('active');
            }
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            
            const progress = (checked.length / checkboxes.length) * 100;
            
            document.getElementById('overall-progress').style.width = progress + '%';
            document.getElementById('progress-text').innerText = Math.round(progress) + '%';
        }
    </script>
</body>
</html>
